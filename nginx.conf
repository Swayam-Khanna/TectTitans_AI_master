server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com; # Replace with your domain

    # Redirect HTTP to HTTPS (uncomment after installing Certbot)
    # return 301 https://$host$request_uri;

    # Root directory pointing to the compiled Vite frontend static files
    root /var/www/TechTitans-AI/artifacts/techtitans-ai/dist;
    index index.html;

    # Client-Side Routing Fallback (supports React Router / Wouter)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the PM2-managed Express Backend
    location /api/ {
        proxy_pass http://127.0.0.1:8080; # Match PM2 Express Server port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static Assets Caching Optimization
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Prevent access to hidden files/configs
    location ~ /\. {
        deny all;
    }
}
